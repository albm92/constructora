services:
  - type: web
    name: constructora
    env: php
    plan: free
    buildCommand: composer install --no-dev --optimize-autoloader && php artisan key:generate --force && php artisan config:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false